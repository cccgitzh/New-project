name = "37-nav-api"
main = "src/index.ts"
compatibility_date = "2026-05-15"
workers_dev = true

[observability]
enabled = true

[vars]
# none: open personal lab mode. access: require Cloudflare Zero Trust Access headers.
AUTH_MODE = "none"
# Set this to your Pages origin after deployment, for example https://37-nav.pages.dev.
CORS_ORIGIN = "*"
# Comma-separated allowlist used only when AUTH_MODE = "access".
ADMIN_EMAILS = ""
HEALTH_CHECK_BATCH_SIZE = "25"

[[kv_namespaces]]
binding = "NAV_KV"
id = "b7b9c95eb9eb4e01a2e6017e7bcc3b88"
preview_id = "8d0ff383e3804f27b6bbef8e2bd6af0b"

[[d1_databases]]
binding = "NAV_DB"
database_name = "37-nav-db"
database_id = "72561014-6760-4879-9477-7a4edb1f431b"

[[vectorize]]
binding = "NAV_VECTOR"
index_name = "nav-sites"

[ai]
binding = "AI"

[triggers]
crons = ["*/30 * * * *"]
