<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>37° Nav - 管理后台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="shell">
    <header class="top-nav">
      <div class="nav-left">
        <div class="brand-mark">37°</div>
        <span class="brand-text-sm">37° Nav Admin</span>
      </div>

      <div class="nav-center">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
          <input id="searchInput" placeholder="搜索本地站点..." autocomplete="off" />
          <span class="kbd-shortcut">⌘ K</span>
          
          <div class="search-actions">
            <button class="engine-btn" data-engine="google" title="Google 搜索"><svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C8.36,19.27 5,16.25 5,12C5,7.9 8.2,4.73 12.2,4.73C15.29,4.73 17.1,6.7 17.1,6.7L19,4.72C19,4.72 16.56,2 12.1,2C6.42,2 2.03,6.8 2.03,12C2.03,17.05 6.16,22 12.25,22C17.6,22 21.5,18.33 21.5,12.91C21.5,11.76 21.35,11.1 21.35,11.1V11.1Z"/></svg></button>
            <button class="engine-btn" data-engine="bing" title="Bing 搜索"><svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M5,3V19L8.72,21L18,15.82V11.73H18L9.77,8.95L11.38,12.84L13.94,14L8.7,16.92V4.27L5,3Z"/></svg></button>
            <button class="engine-btn" data-engine="github" title="GitHub 搜索"><svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M12,2A10,10 0 0,0 8.84,21.5C9.34,21.58 9.5,21.27 9.5,21C9.5,20.77 9.5,20.14 9.5,19.31C6.73,19.91 6.14,17.97 6.14,17.97C5.68,16.81 5.03,16.5 5.03,16.5C4.12,15.88 5.1,15.9 5.1,15.9C6.1,15.97 6.63,16.93 6.63,16.93C7.5,18.45 8.97,18 9.54,17.76C9.63,17.11 9.89,16.67 10.17,16.42C7.95,16.17 5.62,15.31 5.62,11.5C5.62,10.39 6,9.5 6.65,8.79C6.55,8.54 6.2,7.5 6.75,6.15C6.75,6.15 7.59,5.88 9.5,7.17C10.29,6.95 11.15,6.84 12,6.84C12.85,6.84 13.71,6.95 14.5,7.17C16.41,5.88 17.25,6.15 17.25,6.15C17.8,7.5 17.45,8.54 17.35,8.79C18,9.5 18.38,10.39 18.38,11.5C18.38,15.32 16.04,16.16 13.81,16.41C14.17,16.72 14.5,17.33 14.5,18.26C14.5,19.6 14.5,20.68 14.5,21C14.5,21.27 14.66,21.59 15.17,21.5A10,10 0 0,0 12,2Z"/></svg></button>
            <div class="search-divider"></div>
            <button id="semanticBtn" class="primary" style="padding: 4px 10px;">AI 语义检索</button>
          </div>
        </div>
      </div>

      <div class="nav-right">
        <nav id="categoryList" class="category-list"></nav>
        <div class="search-divider"></div>
        <button id="newSiteBtn" class="primary">+ 站点</button>
        <button id="addCatBtn" class="ghost">+ 分类</button>
        <button id="healthBtn" class="ghost" title="触发全站健康巡检">🩺</button>
        <button id="exportBtn" class="ghost" title="导出数据备份">↓</button>
        <label class="ghost" title="导入数据恢复" style="cursor: pointer; padding: 6px 12px; margin:0;">
          ↑ <input id="importFile" type="file" accept="application/json" hidden />
        </label>
        <div class="status-pill" id="syncStatus">OK</div>
      </div>
    </header>

    <main class="main">
      <div id="sitesGrid" class="sites-grid"></div>
    </main>
  </div>

  <dialog id="siteDialog">
    <form method="dialog" class="dialog-form">
      <div class="hud-header">
        <h2 id="dialogTitle">新增站点</h2>
        <button type="button" id="deleteSiteBtn" class="danger-btn" style="display:none;">删除此站点</button>
      </div>
      <div class="hud-body">
        <div class="ai-parse-box">
          <input id="aiParseInput" placeholder="粘贴网址或描述，让 AI 帮你一键解析填表 ->" />
          <button type="button" id="aiParseBtn" class="ghost">智能识别</button>
        </div>
        <div class="hud-grid">
          <input name="title" placeholder="标题 (必填)" required />
          <input name="url" placeholder="URL 链接 (必填)" required />
          <input name="icon" placeholder="图标 (选填 Emoji 或 图片URL)" />
          <select name="category_id"></select>
        </div>
        <textarea name="description" placeholder="站点描述 (选填)"></textarea>
        <input name="tags_text" placeholder="标签，用逗号分隔 (选填)" />
        <div class="dialog-actions">
          <button type="button" id="cancelSiteBtn" class="ghost">取消</button>
          <button id="saveSiteBtn" value="default" class="primary">保存数据</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog id="categoryDialog">
    <form method="dialog" class="dialog-form">
      <div class="hud-header">
        <h2 id="catDialogTitle">新建分类</h2>
      </div>
      <div class="hud-body">
        <input name="name" placeholder="分类名称 (必填，如：AI 工具)" required />
        <input name="icon" placeholder="分类图标 (选填 Emoji)" />
        <input name="slug" placeholder="英文标识 (选填，如 ai-tools)" />
        <div class="dialog-actions">
          <button type="button" id="cancelCatBtn" class="ghost">取消</button>
          <button id="saveCatBtn" value="default" class="primary">保存分类</button>
        </div>
      </div>
    </form>
  </dialog>

  <script src="./config.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
