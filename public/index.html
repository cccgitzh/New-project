<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>37° Nav - 星际指挥中心 (访客入口)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark">37°</div>
        <div>
          <strong>37° Nav</strong>
          <small>访客入口</small>
        </div>
      </div>
      <nav id="categoryList" class="category-list"></nav>
    </aside>

    <main class="main">
      <header class="hero">
        <div>
          <h1>Welcome to <br><span class="highlight">37°</span> <span class="brand-text">Nav</span></h1>
          <p class="slogan">你的恒温个人数字入口，边缘原生，零维护永在线。</p>
        </div>
        <div class="status-pill" id="syncStatus">同步中</div>
      </header>

      <section class="command">
        <input id="searchInput" placeholder="搜索站点..." />
        <button id="searchBtn" class="primary">语义搜索</button>
      </section>

      <div class="grid">
        <section class="panel sites">
          <div class="panel-head">
            <h2>导航矩阵</h2>
          </div>
          <div id="sitesGrid" class="sites-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
