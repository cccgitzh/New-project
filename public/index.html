<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>37° Nav - 星际指挥中心 (访客入口)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark">37°</div>
        <div>
          <strong>37° Nav</strong>
          <small>访客入口</small>
        </div>
      </div>
      <nav id="categoryList" class="category-list"></nav>
    </aside>

    <main class="main">
      <header class="hero">
        <div>
          <h1>Welcome to <br><span class="highlight">37°</span> <span class="brand-text">Nav</span></h1>
          <p class="slogan">你的恒温个人数字入口，边缘原生，零维护永在线。</p>
        </div>
        <div class="status-pill" id="syncStatus">同步中</div>
      </header>

      <section class="command">
          <div class="search-wrapper">
            <input id="searchInput" placeholder="搜索本地站点，或使用右侧外部引擎 ->" autocomplete="off" />
            <div class="search-actions">
              <button class="engine-btn" data-engine="google" title="使用 Google 搜索">
                <svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C8.36,19.27 5,16.25 5,12C5,7.9 8.2,4.73 12.2,4.73C15.29,4.73 17.1,6.7 17.1,6.7L19,4.72C19,4.72 16.56,2 12.1,2C6.42,2 2.03,6.8 2.03,12C2.03,17.05 6.16,22 12.25,22C17.6,22 21.5,18.33 21.5,12.91C21.5,11.76 21.35,11.1 21.35,11.1V11.1Z"/></svg>
              </button>
              <button class="engine-btn" data-engine="bing" title="使用 Bing 搜索">
                <svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M5,3V19L8.72,21L18,15.82V11.73H18L9.77,8.95L11.38,12.84L13.94,14L8.7,16.92V4.27L5,3Z"/></svg>
              </button>
              <button class="engine-btn" data-engine="github" title="在 GitHub 搜索代码">
                <svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="currentColor" d="M12,2A10,10 0 0,0 8.84,21.5C9.34,21.58 9.5,21.27 9.5,21C9.5,20.77 9.5,20.14 9.5,19.31C6.73,19.91 6.14,17.97 6.14,17.97C5.68,16.81 5.03,16.5 5.03,16.5C4.12,15.88 5.1,15.9 5.1,15.9C6.1,15.97 6.63,16.93 6.63,16.93C7.5,18.45 8.97,18 9.54,17.76C9.63,17.11 9.89,16.67 10.17,16.42C7.95,16.17 5.62,15.31 5.62,11.5C5.62,10.39 6,9.5 6.65,8.79C6.55,8.54 6.2,7.5 6.75,6.15C6.75,6.15 7.59,5.88 9.5,7.17C10.29,6.95 11.15,6.84 12,6.84C12.85,6.84 13.71,6.95 14.5,7.17C16.41,5.88 17.25,6.15 17.25,6.15C17.8,7.5 17.45,8.54 17.35,8.79C18,9.5 18.38,10.39 18.38,11.5C18.38,15.32 16.04,16.16 13.81,16.41C14.17,16.72 14.5,17.33 14.5,18.26C14.5,19.6 14.5,20.68 14.5,21C14.5,21.27 14.66,21.59 15.17,21.5A10,10 0 0,0 12,2Z"/></svg>
              </button>
              
              <div class="search-divider"></div>
              <button id="semanticBtn" class="primary">语义搜索</button>
            </div>
          </div>
        </section>

      <div class="grid">
        <section class="panel sites">
          <div class="panel-head">
            <h2>导航矩阵</h2>
          </div>
          <div id="sitesGrid" class="sites-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
